services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php_plain_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-php_app}
      MYSQL_USER: ${MYSQL_USER:-php_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-php_password}
      BITACORA_STORAGE_PATH: /var/www/html/storage/bitacoras_pdf
      SESSION_SECURE: ${SESSION_SECURE:-false}
      SESSION_SAMESITE: ${SESSION_SAMESITE:-Lax}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-ssl}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_VERIFY_TLS: ${SMTP_VERIFY_TLS:-true}
    command: sh -lc "mkdir -p public/uploads/preventivos public/uploads/correctivos public/uploads/locativos/preventivos public/uploads/locativos/correctivos storage/bitacoras_pdf storage/logs && chown -R www-data:www-data public/uploads storage && chmod -R ug+rwX public/uploads storage && exec php-fpm"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - php_plain_net

  nginx:
    image: nginx:1.31-alpine
    container_name: php_plain_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - php_plain_net

  db:
    image: mysql:8.4
    container_name: php_plain_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-php_app}
      MYSQL_USER: ${MYSQL_USER:-php_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-php_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - php_plain_net

  phpmyadmin:
    image: phpmyadmin:5.2.2-apache
    container_name: php_plain_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - db
    networks:
      - php_plain_net

networks:
  php_plain_net:
    driver: bridge

volumes:
  db_data:
